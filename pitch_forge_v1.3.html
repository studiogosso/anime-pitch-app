    const input=document.getElementById('syncTokenInput'); const token=input.value.trim();
    if(!token||token==='••••••••••') return;
    syncToken=token; localStorage.setItem('ap_sync_token',syncToken);
    await fetchSyncSha(); await syncToGitHub(); initSyncUI(); showToast('GitHub同期を設定しました');
  });
  document.getElementById('syncDisconnectBtn').addEventListener('click',()=>{
    syncToken=''; syncSha=''; localStorage.removeItem('ap_sync_token'); localStorage.removeItem('ap_sync_sha');
    initSyncUI(); showToast('同期を解除しました');
  });
  initSyncUI();

  // ===== Compare Mode =====
  let compareMode = false;
  let compareSelected = [];

  function toggleCompareMode(){
    compareMode = !compareMode;
    compareSelected = [];
    document.getElementById('compareToggle').classList.toggle('active', compareMode);
    document.getElementById('compareBar').classList.toggle('hidden', !compareMode);
    updateCompareUI();
    renderCards();
  }
  function updateCompareUI(){
    document.getElementById('compareCount').textContent = compareSelected.length + '\u4EF6\u9078\u629E\u4E2D';
    const goBtn = document.getElementById('compareGoBtn');
    goBtn.disabled = compareSelected.length < 2;
  }
  function renderCompareModal(){
    const modal = document.getElementById('compareModal');
    const cols = document.getElementById('compareColumns');
    const proposals = compareSelected.map(id => PROPOSALS_DATA.find(p=>p.id===id)).filter(Boolean);
    if(proposals.length < 2){ showToast('2\u4EF6\u4EE5\u4E0A\u9078\u629E\u3057\u3066\u304F\u3060\u3055\u3044'); return; }
    cols.innerHTML = proposals.map(p => {
      const r = state.reviews[p.id];
      const tagsHtml = p.tags.map(t => {
        const c = getTagColor(t);
        return `<span class="tag-badge" style="background:${c}22;color:${c};font-size:0.65rem;padding:2px 6px">${t}</span>`;
      }).join('');
      let statusHtml = '';
      if(r && r.status){
        const statusColors = {go:'var(--green)',rework:'var(--yellow)',pass:'var(--red)',maybe:'var(--accent)'};
        const statusLabels = {go:'GO',rework:'\u8981\u6539\u5584',pass:'\u898B\u9001\u308A',maybe:'\u4FDD\u7559'};
        statusHtml = `<span class="col-status" style="background:${statusColors[r.status]}22;color:${statusColors[r.status]}">${statusLabels[r.status]||r.status}</span>`;
      } else {
        statusHtml = '<span class="col-status" style="background:var(--bg3);color:var(--text3)">\u672A\u30EC\u30D3\u30E5\u30FC</span>';
      }
      const starHtml = r && r.rating ? '\u2605'.repeat(r.rating) + '\u2606'.repeat(5-r.rating) : '\u2606\u2606\u2606\u2606\u2606';
      const liked = state.likes[p.id] ? '<span style="color:var(--pink)">\u2764</span>' : '';
      return `<div class="compare-col">
        <div class="col-section">
          <div class="col-title">${escapeHtml(p.title)}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
            <span class="col-rating card-rating ${p.rating}">${p.rating}</span>
            <span class="card-type ${p.type}" style="font-size:0.6rem">${p.type==='proposal'?'\u4F01\u753B\u66F8':'\u30B7\u30FC\u30C9'}</span>
            ${liked}
          </div>
        </div>
        <div class="col-section">
          <div class="col-label">Logline</div>
          <div class="col-text">${escapeHtml(p.logline)}</div>
        </div>
        ${p.hook ? `<div class="col-section"><div class="col-label">Hook</div><div class="col-text">${escapeHtml(p.hook)}</div></div>` : ''}
        <div class="col-section">
          <div class="col-label">\u30BF\u30B0</div>
          <div class="col-tags">${tagsHtml}</div>
        </div>
        <div class="col-section">
          <div class="col-label">\u30EC\u30D3\u30E5\u30FC</div>
          <div style="margin-bottom:4px">${statusHtml}</div>
          <div style="font-size:0.85rem;color:var(--yellow)">${starHtml}</div>
          ${r && r.comment ? `<div class="col-text" style="margin-top:4px;font-size:0.75rem;font-style:italic">${escapeHtml(r.comment).slice(0,100)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    modal.classList.remove('hidden');
  }

  document.getElementById('compareToggle').addEventListener('click', toggleCompareMode);
  document.getElementById('compareCancelBtn').addEventListener('click', ()=>{
    compareMode = false;
    compareSelected = [];
    document.getElementById('compareToggle').classList.remove('active');
    document.getElementById('compareBar').classList.add('hidden');
    renderCards();
  });
  document.getElementById('compareGoBtn').addEventListener('click', ()=>{
    if(compareSelected.length >= 2) renderCompareModal();
  });
  document.getElementById('compareModalClose').addEventListener('click', ()=>{
    document.getElementById('compareModal').classList.add('hidden');
  });
  document.getElementById('compareModal').addEventListener('click', e=>{
    if(e.target.id==='compareModal') e.target.classList.add('hidden');
  });

  // Intercept card clicks for compare mode
  const origCardListEl = document.getElementById('cardList');
  origCardListEl.addEventListener('click', e => {
    if(!compareMode) return;
    // Allow heart button to work normally even in compare mode
    if(e.target.closest('[data-heart]')) return;
    const card = e.target.closest('.card');
    if(!card) return;
    e.stopPropagation();
    e.preventDefault();
    const id = card.dataset.id;
    const idx = compareSelected.indexOf(id);
    if(idx >= 0){
      compareSelected.splice(idx, 1);
    } else {
      if(compareSelected.length >= 3){ showToast('\u6700\u59273\u4EF6\u307E\u3067\u9078\u629E\u3067\u304D\u307E\u3059'); return; }
      compareSelected.push(id);
    }
    updateCompareUI();
    // Update checkboxes visually
    document.querySelectorAll('.card .compare-check').forEach(ch => {
      ch.classList.toggle('checked', compareSelected.includes(ch.closest('.card').dataset.id));
    });
  }, true); // Use capture phase to intercept before normal handler

  // Patch renderCards to add checkboxes in compare mode
  const origRenderCards = renderCards;
  renderCards = function(){
    origRenderCards();
    if(compareMode){
      document.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.id;
        if(!card.querySelector('.compare-check')){
          const check = document.createElement('div');
          check.className = 'compare-check' + (compareSelected.includes(id) ? ' checked' : '');
          check.innerHTML = '\u2713';
          card.appendChild(check);
        }
      });
    }
  };

  // ===== PWA Install =====
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault(); deferredPrompt=e;
    if(!localStorage.getItem('ap_install_dismissed')) document.getElementById('installBanner').classList.remove('hidden');
  });
  document.getElementById('installBtn').addEventListener('click',async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt(); const result=await deferredPrompt.userChoice;
    if(result.outcome==='accepted') showToast('アプリをインストールしました！');
    deferredPrompt=null; document.getElementById('installBanner').classList.add('hidden');
  });
  document.getElementById('installClose').addEventListener('click',()=>{
    document.getElementById('installBanner').classList.add('hidden');
    localStorage.setItem('ap_install_dismissed','1');
  });
  window.addEventListener('appinstalled',()=>{ document.getElementById('installBanner').classList.add('hidden'); deferredPrompt=null; });
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW failed:',e));
}
</script>
</body>
</html>
